{% extends "base.html" %}
{% set active_page = "review" %}

{% block title %}Review Pool — AZ-500{% endblock %}

{% block content %}
<div style="max-width: 840px; margin: 0 auto;">

    <!-- Header -->
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px;">
        <div>
            <h1 class="page-title" data-i18n="review.title">Review Pool</h1>
            <p class="page-subtitle" data-i18n="review.subtitle">Bookmarked and incorrectly answered questions</p>
        </div>
        <button class="btn btn-primary" onclick="startReviewSession()" id="btn-start-review" data-i18n="review.start_session">
            Practice Review Pool
        </button>
    </div>

    <!-- Stats Bar -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;">
        <div class="card" style="padding: 20px; text-align: center;">
            <div style="font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--c-primary);" id="review-total">—</div>
            <div style="font-size: 12px; color: var(--c-text-muted); margin-top: 4px;" data-i18n="review.total_items">Total Items</div>
        </div>
        <div class="card" style="padding: 20px; text-align: center;">
            <div style="font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--c-warning);" id="review-bookmarks">—</div>
            <div style="font-size: 12px; color: var(--c-text-muted); margin-top: 4px;" data-i18n="review.from_bookmarks">Bookmarked</div>
        </div>
        <div class="card" style="padding: 20px; text-align: center;">
            <div style="font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--c-danger);" id="review-exams">—</div>
            <div style="font-size: 12px; color: var(--c-text-muted); margin-top: 4px;" data-i18n="review.from_wrong">Wrong Answers</div>
        </div>
    </div>

    <!-- Items List -->
    <div class="card" style="padding: 24px;">
        <div id="review-items"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/review.js?v=23"></script>
{% endblock %}
